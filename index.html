<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f6fa" />
    <meta name="description" content="Syntriq Studio — your private, on-device study toolkit. Convert, compress & organise files without anything leaving your device." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Syntriq" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Syntriq Studio — Study Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply the saved theme (default: professional) before first paint.
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem("syntriq.theme") || "professional";
      } catch (e) {
        document.documentElement.dataset.theme = "professional";
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
